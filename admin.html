<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · Deutsch Meistern</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d1b6e;--blue:#2563eb;--purple:#7c3aed;--green:#16a34a;
  --red:#dc2626;--muted:#64748b;--border:#c7d2fe;--bg:#f0f4ff;
  --sh:0 2px 12px rgba(37,99,235,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--navy);min-height:100vh;}

/* GATE */
#gate{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#1e40af,#6d28d9);display:flex;align-items:center;justify-content:center;padding:24px;}
#gate.hidden{display:none;}
.gate-box{background:#fff;border-radius:20px;padding:32px 28px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.g-title{font-size:1.4rem;font-weight:900;color:var(--navy);margin-bottom:4px;}
.g-sub{font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:20px;}
.g-inp{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--navy);outline:none;margin-bottom:12px;}
.g-inp:focus{border-color:var(--blue);}
.g-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:900;cursor:pointer;}
.g-err{color:var(--red);font-size:.75rem;font-weight:800;margin-top:8px;min-height:18px;}

/* HEADER */
header{background:linear-gradient(135deg,#1e40af,#6d28d9);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.h-title{font-size:1.1rem;font-weight:900;}
.h-sub{font-size:.65rem;opacity:.8;font-weight:700;margin-top:2px;}
.h-badge{font-size:.65rem;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:50px;font-weight:800;}

/* MAIN */
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 60px;}

/* SECTION */
.section-title{font-size:.7rem;font-weight:900;color:var(--purple);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px;margin-top:28px;}

/* ADD STUDENT CARD */
.card{background:#fff;border:2px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--sh);margin-bottom:16px;}
.card-title{font-size:.9rem;font-weight:900;color:var(--navy);margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
label{font-size:.72rem;font-weight:800;color:var(--navy);display:block;margin-bottom:4px;}
input.inp{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;color:var(--navy);outline:none;}
input.inp:focus{border-color:var(--blue);}
.add-btn{background:linear-gradient(135deg,var(--green),#15803d);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:900;cursor:pointer;width:100%;margin-top:4px;}
.add-btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{font-size:.78rem;font-weight:800;margin-top:8px;min-height:20px;}
.msg.ok{color:var(--green);}
.msg.err{color:var(--red);}

/* STUDENT LIST */
.student-table{width:100%;border-collapse:collapse;}
.student-table th{font-size:.65rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);}
.student-table td{font-size:.8rem;font-weight:700;padding:10px 10px;border-bottom:1px solid #e0e7ff;color:var(--navy);vertical-align:top;}
.student-table tr:last-child td{border-bottom:none;}
.badge-code{font-family:monospace;background:#eff6ff;color:var(--blue);padding:2px 7px;border-radius:6px;font-size:.75rem;}
.badge-level{background:#f5f3ff;color:var(--purple);padding:2px 7px;border-radius:6px;font-size:.7rem;font-weight:800;}
.activity-list{font-size:.7rem;color:var(--muted);line-height:1.7;}
.btn-view{font-size:.7rem;background:#eff6ff;color:var(--blue);border:1.5px solid var(--border);border-radius:7px;padding:3px 9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;}
.btn-lvl{font-size:.7rem;background:#f5f3ff;color:#7c3aed;border:1.5px solid #ddd6fe;border-radius:7px;padding:3px 9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;margin-left:4px;}
.btn-del{font-size:.7rem;background:#fff1f1;color:var(--red);border:1.5px solid #fecaca;border-radius:7px;padding:3px 9px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;margin-left:4px;}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:.85rem;font-weight:700;}
.loading{text-align:center;padding:20px;color:var(--blue);font-weight:800;font-size:.85rem;}

/* MODAL */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:888;display:none;align-items:center;justify-content:center;padding:16px;}
#modal-bg.open{display:flex;}
#modal{background:#fff;border-radius:16px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;}
#modal-title{font-size:1rem;font-weight:900;color:var(--navy);margin-bottom:4px;}
#modal-code{font-size:.75rem;color:var(--muted);font-weight:700;margin-bottom:14px;}
.modal-entry{font-size:.8rem;color:var(--navy);font-weight:700;padding:6px 0;border-bottom:1px solid #e0e7ff;display:flex;justify-content:space-between;}
.modal-entry:last-child{border:none;}
.modal-type{color:var(--blue);}
.modal-time{color:var(--muted);font-size:.7rem;}
.modal-close{margin-top:14px;width:100%;padding:10px;background:#f1f5f9;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-weight:900;cursor:pointer;color:var(--navy);}
.refresh-btn{font-size:.72rem;background:#fff;border:1.5px solid var(--border);color:var(--blue);border-radius:8px;padding:4px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;margin-left:8px;}
</style>
</head>
<body>

<!-- ADMIN GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="g-title">🔐 Admin Access</div>
    <div class="g-sub">Deutsch Meistern · Teacher Dashboard</div>
    <input class="g-inp" id="admin-inp" type="password" placeholder="Admin password…" maxlength="40" onkeydown="if(event.key==='Enter')checkAdmin()">
    <button class="g-btn" onclick="checkAdmin()">Enter Dashboard</button>
    <div class="g-err" id="admin-err"></div>
  </div>
</div>

<!-- HEADER -->
<header>
  <div>
    <div class="h-title">🇩🇪 Deutsch Meistern · Admin</div>
    <div class="h-sub">Teacher Dashboard</div>
  </div>
  <div class="h-badge">Anshuka</div>
</header>

<!-- MAIN -->
<div class="wrap">

  <!-- ADD STUDENT -->
  <div class="section-title">➕ Add New Student</div>
  <div class="card">
    <div class="card-title">Create Student Account</div>
    <div class="form-row">
      <div>
        <label>Full Name</label>
        <input class="inp" id="new-name" type="text" placeholder="e.g. Priya Sharma" maxlength="60">
      </div>
      <div>
        <label>Student Code</label>
        <input class="inp" id="new-code" type="text" placeholder="e.g. DM-001" maxlength="20" style="text-transform:uppercase;">
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Password</label>
        <input class="inp" id="new-pass" type="text" placeholder="e.g. Priya2024" maxlength="30">
      </div>
      <div>
        <label>Level (optional)</label>
        <input class="inp" id="new-level" type="text" placeholder="e.g. A1" maxlength="10">
      </div>
    </div>
    <button class="add-btn" id="add-btn" onclick="addStudent()">Add Student</button>
    <div class="msg" id="add-msg"></div>
  </div>

  <!-- STUDENT LIST -->
  <div class="section-title">
    👥 Students
    <button class="refresh-btn" onclick="loadStudents()">↻ Refresh</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden;">
    <div id="student-list"><div class="loading">Loading students...</div></div>
  </div>

</div>

<!-- ACTIVITY MODAL -->
<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div id="modal-title"></div>
    <div id="modal-code"></div>
    <div id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, serverTimestamp, orderBy, query, limit, getDoc }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCuMSWNpOIlnqqxFmy08CfIcbvAUpTXo1E",
  authDomain: "deutschmeistern-abc4d.firebaseapp.com",
  projectId: "deutschmeistern-abc4d",
  storageBucket: "deutschmeistern-abc4d.firebasestorage.app",
  messagingSenderId: "282075407369",
  appId: "1:282075407369:web:4a5587b4eb391e768004d8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── SHA-256 HASH ──
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── ADMIN PASSWORD (loaded from Firestore, never in source code) ──
let ADMIN_PASS_HASH = '';
(async () => {
  try {
    const cfg = await getDoc(doc(db, 'config', 'site'));
    if (cfg.exists()) ADMIN_PASS_HASH = cfg.data().adminPass;
  } catch(e) {}
})();

window.checkAdmin = async function() {
  const v = document.getElementById('admin-inp').value.trim();
  const hash = await sha256(v);
  if (hash === ADMIN_PASS_HASH) {
    document.getElementById('gate').classList.add('hidden');
    loadStudents();
  } else {
    document.getElementById('admin-err').textContent = '❌ Wrong password.';
    setTimeout(() => document.getElementById('admin-err').textContent = '', 2000);
  }
};

window.addStudent = async function() {
  const name = document.getElementById('new-name').value.trim();
  const code = document.getElementById('new-code').value.trim().toUpperCase();
  const pass = document.getElementById('new-pass').value.trim();
  const level = document.getElementById('new-level').value.trim().toUpperCase() || 'A1';
  const msg = document.getElementById('add-msg');

  if (!name || !code || !pass) {
    msg.className = 'msg err';
    msg.textContent = '❌ Please fill in name, code and password.';
    return;
  }

  document.getElementById('add-btn').disabled = true;
  msg.className = 'msg';
  msg.textContent = '⏳ Adding...';

  try {
    const passHash = await sha256(pass);
    await addDoc(collection(db, 'students'), {
      name, code, password: passHash, level,
      createdAt: serverTimestamp()
    });
    msg.className = 'msg ok';
    msg.textContent = '✅ Student "' + name + '" added! Code: ' + code;
    document.getElementById('new-name').value = '';
    document.getElementById('new-code').value = '';
    document.getElementById('new-pass').value = '';
    document.getElementById('new-level').value = '';
    loadStudents();
  } catch(e) {
    msg.className = 'msg err';
    msg.textContent = '❌ Error: ' + e.message;
  }
  document.getElementById('add-btn').disabled = false;
};

window.loadStudents = async function() {
  const el = document.getElementById('student-list');
  el.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const snap = await getDocs(collection(db, 'students'));
    if (snap.empty) {
      el.innerHTML = '<div class="empty">No students yet. Add your first student above!</div>';
      return;
    }
    let html = '<table class="student-table"><thead><tr><th>Name</th><th>Code</th><th>Password</th><th>Level</th><th>Activity</th></tr></thead><tbody>';
    snap.forEach(d => {
      const s = d.data();
      html += `<tr>
        <td><strong>${s.name}</strong></td>
        <td><span class="badge-code">${s.code}</span></td>
        <td style="font-family:monospace;font-size:.78rem;color:#94a3b8;">••••••••</td>
        <td><span class="badge-level">${s.level || 'A1'}</span></td>
        <td>
          <button class="btn-view" onclick="viewActivity('${d.id}','${s.name}','${s.code}')">View Activity</button>
          <button class="btn-lvl" data-lvl-id="${d.id}" onclick="changeLevel('${d.id}','${s.name}','${s.level || 'A1'}')">Change Level</button>
          <button class="btn-del" data-del-id="${d.id}" onclick="deleteStudent('${d.id}','${s.name}')">Delete</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty" style="color:red;">Error loading: ' + e.message + '</div>';
  }
};

window.deleteStudent = async function(id, name) {
  const btn = document.querySelector(`[data-del-id="${id}"]`);
  if (btn && btn.dataset.confirming !== 'yes') {
    btn.dataset.confirming = 'yes';
    btn.textContent = 'Sure?';
    btn.style.background = '#dc2626';
    btn.style.color = '#fff';
    setTimeout(() => {
      btn.dataset.confirming = '';
      btn.textContent = 'Delete';
      btn.style.background = '';
      btn.style.color = '';
    }, 3000);
    return;
  }
  try {
    if (btn) { btn.disabled = true; btn.textContent = '...'; }
    await deleteDoc(doc(db, 'students', id));
    loadStudents();
  } catch(e) {
    const el = document.getElementById('student-list');
    const errDiv = document.createElement('div');
    errDiv.style.cssText = 'color:red;padding:8px;font-size:.8rem;font-weight:700;';
    errDiv.textContent = 'Delete error: ' + e.message;
    el.prepend(errDiv);
  }
};

window.changeLevel = async function(id, name, currentLevel) {
  const LEVELS = ['A1','A2','B1','B2','C1'];
  const newLevel = prompt(`Change level for ${name}\n\nCurrent level: ${currentLevel}\n\nEnter new level (A1, A2, B1, B2, C1):`);
  if (!newLevel) return;
  const clean = newLevel.trim().toUpperCase();
  if (!LEVELS.includes(clean)) {
    alert('Invalid level. Please enter one of: A1, A2, B1, B2, C1');
    return;
  }
  if (clean === currentLevel) {
    alert(`${name} is already on ${clean}.`);
    return;
  }
  const btn = document.querySelector(`[data-lvl-id="${id}"]`);
  try {
    if (btn) { btn.disabled = true; btn.textContent = '...'; }
    await updateDoc(doc(db, 'students', id), { level: clean });
    loadStudents();
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = 'Change Level'; }
    alert('Error updating level: ' + e.message);
  }
};

window.viewActivity = async function(id, name, code) {
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-code').textContent = 'Code: ' + code;
  document.getElementById('modal-body').innerHTML = '<div class="loading">Loading activity...</div>';
  document.getElementById('modal-bg').classList.add('open');

  try {
    const q = query(collection(db, 'students', id, 'activity'), orderBy('timestamp', 'desc'), limit(50));
    const snap = await getDocs(q);
    if (snap.empty) {
      document.getElementById('modal-body').innerHTML = '<div class="empty">No activity yet.</div>';
      return;
    }
    let html = '';
    snap.forEach(d => {
      const a = d.data();
      const time = a.timestamp ? new Date(a.timestamp.seconds * 1000).toLocaleString('en-IN') : 'Just now';
      const label = a.type === 'login' ? '🔑 Logged in' : a.type === 'level_visit' ? '📚 Opened ' + a.level : a.type;
      html += `<div class="modal-entry"><span class="modal-type">${label}</span><span class="modal-time">${time}</span></div>`;
    });
    document.getElementById('modal-body').innerHTML = html;
  } catch(e) {
    document.getElementById('modal-body').innerHTML = '<div class="empty" style="color:red;">Error: ' + e.message + '</div>';
  }
};

window.closeModal = function() {
  document.getElementById('modal-bg').classList.remove('open');
};
</script>
</body>
</html>
